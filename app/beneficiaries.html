<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NexusPay | Beneficiarios</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], poppins: ['Poppins', 'sans-serif'] }, colors: { background: '#0B1120', surface: '#0F172A', elevated: '#1E293B', primary: '#3B82F6', success: '#10B981', error: '#EF4444', textmain: '#F8FAFC', textmuted: '#94A3B8', bordercolor: '#1E293B' } } } }
    </script>
    <style>
      body { background-color: #0B1120; color: #F8FAFC; overflow-x: hidden; }
      .glass-card { background: #0F172A; border: 1px solid #1E293B; border-radius: 16px; }
      .sidebar-item { border-radius: 10px; transition: all 0.15s; font-size: 0.875rem; font-weight: 500; color: #94A3B8; }
      .sidebar-item:hover { color: #F8FAFC; background: #1E293B; }
      .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3B82F6; }
      .input-neo { background: #0B1120 !important; border: 1px solid #1E293B !important; color: #F8FAFC !important; transition: all 0.2s; border-radius: 8px;}
      .input-neo:focus { border-color: #3B82F6 !important; outline: none; box-shadow: 0 0 0 1px #3B82F6 !important; }
      ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-up { animation: fadeUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex min-h-screen font-sans antialiased text-textmain bg-background">

<aside class="hidden md:flex flex-col w-64 bg-background border-r border-bordercolor fixed h-full z-40">
    <div class="p-8 h-24 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
            <span class="material-symbols-outlined text-white text-xl">account_balance_wallet</span>
        </div>
        <span class="font-poppins font-semibold text-lg tracking-tight text-white">NexusPay</span>
    </div>
    <div class="px-8 py-4 px-6 text-[10px] font-semibold text-textmuted uppercase tracking-widest">Main Menu</div>
    <nav class="flex-1 px-4 space-y-1">
        <a class="sidebar-item flex items-center gap-3 px-4 py-2.5" href="dashboard.html"><span class="material-symbols-outlined text-lg">dashboard</span> <span>Dashboard</span></a>
        <a class="sidebar-item flex items-center gap-3 px-4 py-2.5" href="transactions.html"><span class="material-symbols-outlined text-lg">sync_alt</span> <span>Movimientos</span></a>
        <a class="sidebar-item flex items-center gap-3 px-4 py-2.5" href="categories.html"><span class="material-symbols-outlined text-lg">category</span> <span>Categorías</span></a>
        <a class="sidebar-item active flex items-center gap-3 px-4 py-2.5" href="beneficiaries.html"><span class="material-symbols-outlined text-lg">group</span> <span>Beneficiarios</span></a>
    </nav>
    <div class="p-4 border-t border-bordercolor">
        <button data-action="logout" class="w-full sidebar-item flex items-center gap-3 px-4 py-2.5 hover:bg-red-500/10 hover:text-red-400 group"><span class="material-symbols-outlined text-lg group-hover:text-red-400">logout</span> <span>Cerrar Sesión</span></button>
    </div>
</aside>

<main class="flex-1 md:ml-64 w-full relative">
    <header class="h-24 bg-background/80 backdrop-blur-md sticky top-0 z-30 flex items-center justify-between px-8">
        <div>
            <h1 class="text-xl font-poppins font-semibold text-white">Directorio</h1>
            <p class="text-xs text-textmuted mt-0.5">Entidades e individuos asociados</p>
        </div>
    </header>

    <div class="px-6 py-6 animate-fade-up">

        <div id="page-alert" class="hidden mb-6"></div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
            <div class="md:col-span-9 flex flex-col gap-4">
                
                <div id="beneficiaries-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Cards de JS -->
                </div>

                <div id="empty-state" class="hidden py-16 flex flex-col items-center justify-center text-center">
                    <div class="w-16 h-16 rounded-[1.2rem] bg-elevated flex items-center justify-center text-textmuted mb-4 shadow-sm border border-bordercolor">
                        <span class="material-symbols-outlined text-3xl">person_off</span>
                    </div>
                    <h3 class="text-base font-semibold text-white mb-1">Ausencia de Contactos</h3>
                    <p class="text-xs text-textmuted max-w-xs">Registra tu primer destinatario para transaccionar en el sistema.</p>
                </div>
            </div>

            <!-- Formulario Base Lateral (Desktop) -->
            <div class="md:col-span-3 sticky top-32">
                <div class="glass-card p-7">
                    <div class="mb-5 border-b border-bordercolor pb-4">
                        <h3 class="text-base font-semibold text-white">Vincular Entidad</h3>
                    </div>
                    
                    <form id="beneficiary-form" class="space-y-6">
                        
                        <div>
                            <label class="block text-[10px] font-semibold text-textmuted mb-2 uppercase tracking-widest">Nombre Formal</label>
                            <input type="text" id="ben-name" class="input-neo w-full px-4 py-3 text-sm" placeholder="Ej. Kodland Inc." required>
                        </div>

                        <div class="pt-4 border-t border-bordercolor mt-4">
                            <button type="submit" class="w-full py-3 rounded-lg bg-primary hover:bg-blue-600 transition-colors font-medium text-white text-sm shadow-md shadow-primary/20">
                                Registrar en Directorio
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<script type="module" src="js/beneficiaries.js"></script>
<script src="js/cursor.js"></script></body>
</html>
