<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NexusPay | Autenticación</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              fontFamily: { sans: ['Inter', 'sans-serif'], poppins: ['Poppins', 'sans-serif'] },
              colors: {
                background: '#0B1120',
                surface: '#1E293B',
                primary: '#3B82F6',
                'primary-hover': '#2563EB',
                success: '#10B981',
                error: '#EF4444',
                textmain: '#F8FAFC',
                textmuted: '#94A3B8',
                bordercolor: '#334155'
              },
              boxShadow: {
                'glow': '0 0 40px -10px rgba(59, 130, 246, 0.4)',
                'card': '0 20px 40px -10px rgba(0,0,0,0.5)',
              },
              animation: {
                'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              },
              keyframes: {
                fadeInUp: {
                  '0%': { opacity: '0', transform: 'translateY(30px)' },
                  '100%': { opacity: '1', transform: 'translateY(0)' },
                }
              }
            }
          }
        }
    </script>
    <style>
      body { background-color: #0B1120; color: #F8FAFC; overflow-x: hidden; }
      .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
      .btn-neo { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .btn-neo:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
      .bg-orbits { 
          position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1; 
          background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                      radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 30%);
      }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative selection:bg-primary selection:text-white">

<div class="bg-orbits"></div>

<main class="w-full max-w-md animate-fade-in-up relative z-10">
    <!-- Brand -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-blue-900 shadow-glow mb-6">
            <span class="material-symbols-outlined text-white text-3xl">account_balance_wallet</span>
        </div>
        <h1 class="text-3xl font-poppins font-extrabold tracking-tight">Nexus<span class="text-primary">Pay</span></h1>
        <p class="text-textmuted mt-2">Banca digital de siguiente generación.</p>
    </div>

    <!-- Alert -->
    <div id="auth-alert" class="hidden p-4 mb-6 text-sm rounded-xl font-medium border glass-panel transition-all" role="alert"></div>

    <!-- Login Container -->
    <div id="login-section" class="glass-panel p-8 sm:p-10 rounded-3xl shadow-card relative overflow-hidden">
        <!-- Glow accent -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-blue-400"></div>

        <h2 class="text-2xl font-poppins font-bold text-white mb-8">Iniciar Sesión</h2>
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-textmuted mb-2 uppercase tracking-wider">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-textmuted text-lg">mail</span>
                    <input id="login-email" class="w-full pl-12 pr-4 py-3.5 rounded-xl font-medium bg-[#0B1120] border border-[#334155] text-white placeholder-[#94A3B8] focus:ring-2 focus:ring-[#3B82F6] focus:border-[#3B82F6] transition-all" placeholder="nombre@ejemplo.com" type="email" required/>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-textmuted mb-2 uppercase tracking-wider">Contraseña</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-textmuted text-lg">lock</span>
                    <input id="login-password" class="w-full pl-12 pr-4 py-3.5 rounded-xl font-medium bg-[#0B1120] border border-[#334155] text-white placeholder-[#94A3B8] focus:ring-2 focus:ring-[#3B82F6] focus:border-[#3B82F6] transition-all" placeholder="••••••••" type="password" required/>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" class="btn-neo w-full py-4 bg-primary text-white font-bold rounded-xl text-sm flex items-center justify-center gap-2">
                    Acceder a mi cuenta <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </div>
        </form>

        <div class="mt-8 text-center">
            <p class="text-textmuted text-sm">¿No tienes cuenta? <a id="toggle-to-register" class="text-primary font-semibold hover:text-white transition-colors cursor-pointer">Abre tu billetera hoy</a></p>
        </div>
    </div>

    <!-- Register Container -->
    <div id="register-section" class="hidden glass-panel p-8 sm:p-10 rounded-3xl shadow-card relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-success to-emerald-400"></div>
        <h2 class="text-2xl font-poppins font-bold text-white mb-8">Únete a NexusPay</h2>
        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-textmuted mb-2 uppercase tracking-wider">Nombre Completo</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-textmuted text-lg">person</span>
                    <input id="register-name" class="w-full pl-12 pr-4 py-3.5 rounded-xl font-medium bg-[#0B1120] border border-[#334155] text-white placeholder-[#94A3B8] focus:ring-2 focus:ring-[#3B82F6] focus:border-[#3B82F6] transition-all" placeholder="Ej. Alex" type="text" required/>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-textmuted mb-2 uppercase tracking-wider">Correo</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-textmuted text-lg">alternate_email</span>
                    <input id="register-email" class="w-full pl-12 pr-4 py-3.5 rounded-xl font-medium bg-[#0B1120] border border-[#334155] text-white placeholder-[#94A3B8] focus:ring-2 focus:ring-[#3B82F6] focus:border-[#3B82F6] transition-all" placeholder="correo@ejemplo.com" type="email" required/>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-textmuted mb-2 uppercase tracking-wider">Clave</label>
                    <input type="password" id="register-password" class="w-full bg-background border border-bordercolor text-textmain px-4 py-3 rounded-lg text-sm transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" placeholder="••••••••" required minlength="6">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-textmuted mb-2 tracking-widest uppercase">Repetir</label>
                    <input type="password" id="register-password-confirm" class="w-full bg-background border border-bordercolor text-textmain px-4 py-3 rounded-lg text-sm transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" placeholder="••••••••" required minlength="6"/>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" class="btn-neo w-full py-4 bg-success text-slate-900 font-bold rounded-xl text-sm flex items-center justify-center gap-2">
                    Crear cuenta <span class="material-symbols-outlined text-sm">rocket_launch</span>
                </button>
            </div>
        </form>
        <div class="mt-8 text-center">
            <p class="text-textmuted text-sm">¿Ya eres miembro? <a id="toggle-to-login" class="text-success font-semibold hover:text-white transition-colors cursor-pointer">Inicia sesión</a></p>
        </div>
    </div>
</main>

<script type="module" src="js/auth.js"></script>
</body>
</html>
